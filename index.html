<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protein Calendar</title><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><style>
body{
font-family:sans-serif;
padding:20px;
text-align:center;
}

input{
padding:10px;
font-size:18px;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style></head><body><h2>Protein Calendar</h2><input type="date" id="datePicker"><div id="result"></div><script>

async function initLiff() {

  await liff.init({
    liffId: "2010771379-0v8talZ9"
  });

}

document
.getElementById("datePicker")
.addEventListener("change", async function() {

  const selectedDate = this.value;

  const response = await fetch(
    "https://YOUR-N8N-DOMAIN/webhook/protein",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        date:selectedDate
      })
    }
  );

  const data = await response.json();

  document.getElementById("result").innerHTML =
      data.protein;

});

initLiff();

</script></body>
</html>
